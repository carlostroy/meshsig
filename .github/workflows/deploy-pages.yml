name: Deploy Borah Landing

on:
  push:
    branches: [main, claude/gallant-bell-yizjmg]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Montar site (MeshSig na raiz + Borah em /borah)
        run: |
          mkdir -p _site
          cp -r docs/. _site/
          mkdir -p _site/borah
          cp corretor-landing/index.html corretor-landing/styles.css corretor-landing/script.js _site/borah/
          cp -r corretor-landing/assets _site/borah/assets

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
