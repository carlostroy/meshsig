<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeshSig — Security Operations</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050a12;--bg2:#0a1220;--cyan:#00d4ff;--green:#00ff88;--amber:#ffb300;--red:#ff2952;--purple:#a855f7;
  --text:#c8d6e5;--muted:#3a7ca5;--dim:#1e3a5f;--border:#0d2137;
  --mono:'JetBrains Mono',monospace;--sans:'Outfit',sans-serif}
body{background:var(--bg);color:var(--text);font-family:var(--sans);height:100vh;overflow:hidden;display:flex}
#sidebar{width:220px;height:100vh;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;z-index:50}
.sb-logo{padding:20px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.sb-logo h1{font:700 15px var(--mono);color:var(--cyan);text-shadow:0 0 10px rgba(0,212,255,0.3)}
.sb-logo .tag{font:400 9px var(--mono);color:var(--green);letter-spacing:0.15em}
.sb-nav{flex:1;padding:12px 0}
.sb-item{display:flex;align-items:center;gap:12px;padding:10px 20px;cursor:pointer;font:500 13px var(--sans);color:var(--muted);transition:all 0.3s;border-left:3px solid transparent;user-select:none}
.sb-item:hover{background:rgba(0,212,255,0.04);color:var(--text)}
.sb-item.active{color:var(--cyan);background:rgba(0,212,255,0.08);border-left-color:var(--cyan)}
.sb-item .icon{width:18px;text-align:center;font:500 14px var(--mono)}
.sb-section{font:600 9px var(--mono);color:var(--muted);letter-spacing:0.15em;padding:16px 20px 6px}
.sb-stats{padding:16px 20px;border-top:1px solid var(--border);margin-top:auto}
.sb-stat{display:flex;justify-content:space-between;margin-bottom:6px}
.sb-stat .label{font:400 10px var(--mono);color:var(--dim)}
.sb-stat .value{font:600 11px var(--mono);color:var(--cyan);text-shadow:0 0 8px rgba(0,212,255,0.3)}
.sb-ws{padding:12px 20px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;font:11px var(--mono)}
.pulse{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 1.5s infinite}
.pulse.off{background:var(--red);box-shadow:0 0 8px var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
#main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden}
#topbar{height:52px;background:rgba(10,18,32,0.98);border-bottom:1px solid rgba(0,212,255,0.08);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0}
#page-title{font:600 14px var(--sans);color:#fff}
#clock{font:500 12px var(--mono);color:var(--cyan)}
.page{display:none;flex:1;overflow:hidden}.page.active{display:flex;flex-direction:column}
#p-office{position:relative}
#p-office canvas{position:absolute;top:0;left:0;width:100%;height:100%}
#bloom-canvas{mix-blend-mode:screen;pointer-events:none;opacity:0.7}
.scanline-overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.015) 2px,rgba(0,0,0,0.015) 4px)}
#events-panel{position:absolute;top:0;right:0;bottom:0;width:320px;background:rgba(5,10,18,0.92);border-left:1px solid rgba(0,212,255,0.1);display:flex;flex-direction:column;backdrop-filter:blur(12px);z-index:10}
#events-header{padding:14px 18px;border-bottom:1px solid rgba(0,212,255,0.08);font:600 10px var(--mono);color:var(--cyan);letter-spacing:0.15em;display:flex;justify-content:space-between}
#events-header .count{color:var(--green);font-size:13px;font-weight:700}
#events{flex:1;overflow-y:auto}#events::-webkit-scrollbar{width:3px}#events::-webkit-scrollbar-thumb{background:var(--border)}
.ev{padding:10px 18px;border-bottom:1px solid rgba(0,212,255,0.04);animation:evIn 0.5s ease;font:12px var(--mono)}
@keyframes evIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
.ev .ts{color:var(--dim);font-size:10px}.ev .from,.ev .to{color:var(--cyan);font-weight:600}.ev .arrow{color:var(--dim);margin:0 4px}
.ev .badge{display:inline-block;padding:2px 8px;border-radius:3px;font-size:9px;margin-left:6px;font-weight:600}
.ev .badge.ok{background:rgba(0,255,136,0.1);color:var(--green);border:1px solid rgba(0,255,136,0.25)}
.ev .badge.fail{background:rgba(255,41,82,0.1);color:var(--red);border:1px solid rgba(255,41,82,0.25)}
.ev .content{display:block;margin-top:5px;padding:6px 12px;background:linear-gradient(90deg,rgba(0,212,255,0.04),transparent);border-left:2px solid rgba(0,212,255,0.3);border-radius:0 4px 4px 0;color:var(--muted);font-size:11px}
.ev.join{border-left:3px solid var(--green)}.ev.handshake{border-left:3px solid var(--purple)}.ev.message{border-left:3px solid var(--amber)}.ev.system{border-left:3px solid var(--dim)}
/* Tooltip */
.nn-tooltip{position:absolute;z-index:20;pointer-events:none;background:rgba(5,10,18,0.94);border:1px solid var(--border);border-radius:8px;padding:12px 16px;backdrop-filter:blur(12px);display:none;min-width:180px}
.nn-tooltip .tt-name{font:600 12px var(--mono);color:var(--text);margin-bottom:4px}
.nn-tooltip .tt-did{font:300 8px var(--mono);color:var(--dim);word-break:break-all;margin-bottom:8px}
.nn-tooltip .tt-row{font:400 9px var(--mono);color:var(--muted);line-height:1.8}
.nn-tooltip .tt-row .tv{color:var(--cyan);float:right}
.nn-tooltip .tt-cap{display:inline-block;padding:2px 6px;border-radius:3px;font-size:8px;margin-top:6px;margin-right:3px;font-weight:500}
/* Other pages (same as before) */
.agents-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;padding:24px;overflow-y:auto;flex:1}
.agent-card{background:var(--bg2);border:1px solid rgba(0,212,255,0.1);border-radius:12px;padding:20px;transition:all 0.3s}
.agent-card:hover{border-color:rgba(0,212,255,0.3);transform:translateY(-2px)}
.agent-card .ac-header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.agent-card .ac-dot{width:10px;height:10px;border-radius:50%}.agent-card .ac-name{font:600 16px var(--sans);color:#fff}
.agent-card .ac-did{font:400 10px var(--mono);color:var(--dim);margin-bottom:12px;word-break:break-all}
.agent-card .ac-row{display:flex;justify-content:space-between;padding:4px 0;font-size:13px}
.agent-card .ac-label{color:var(--muted)}.agent-card .ac-value{color:var(--text);font:500 13px var(--mono)}
.agent-card .ac-caps{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.agent-card .ac-cap{font:400 10px var(--mono);padding:3px 8px;border-radius:4px;background:rgba(0,212,255,0.06);color:var(--cyan);border:1px solid rgba(0,212,255,0.15)}
.messages-list{flex:1;overflow-y:auto;padding:24px}
.msg-row{background:var(--bg2);border:1px solid rgba(0,212,255,0.08);border-radius:10px;padding:16px 20px;margin-bottom:12px}
.msg-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.msg-from,.msg-to{font:600 13px var(--mono);color:var(--cyan)}.msg-arrow{color:var(--dim)}.msg-time{margin-left:auto;font:400 10px var(--mono);color:var(--dim)}
.msg-body{font:400 13px var(--mono);color:var(--muted);padding:10px 14px;background:rgba(0,212,255,0.03);border-radius:6px;margin-bottom:8px;border-left:2px solid rgba(0,212,255,0.15)}
.msg-sig{font:400 10px var(--mono);color:var(--dim);word-break:break-all}
.msg-badge{display:inline-block;padding:2px 8px;border-radius:4px;font:500 10px var(--mono);margin-left:8px}
.msg-badge.valid{background:rgba(0,255,136,0.1);color:var(--green);border:1px solid rgba(0,255,136,0.25)}
.msg-badge.invalid{background:rgba(255,41,82,0.1);color:var(--red);border:1px solid rgba(255,41,82,0.25)}
.audit-content{flex:1;overflow-y:auto;padding:24px}
.audit-summary{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-bottom:32px}
.audit-card{background:var(--bg2);border:1px solid rgba(0,212,255,0.08);border-radius:10px;padding:16px;text-align:center}
.audit-card .val{font:700 28px var(--mono);color:var(--cyan)}.audit-card .lbl{font:400 10px var(--mono);color:var(--muted);margin-top:4px}
.audit-card.green .val{color:var(--green)}.audit-card.amber .val{color:var(--amber)}.audit-card.red .val{color:var(--red)}
.audit-actions{display:flex;gap:12px;margin-bottom:24px}
.audit-btn{padding:10px 20px;background:rgba(0,212,255,0.08);border:1px solid rgba(0,212,255,0.2);color:var(--cyan);font:500 12px var(--mono);border-radius:6px;cursor:pointer}
.audit-json{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:20px;font:400 11px var(--mono);color:var(--muted);max-height:400px;overflow-y:auto;white-space:pre-wrap;word-break:break-all}
.verify-content{flex:1;overflow-y:auto;display:flex;align-items:center;justify-content:center;padding:40px}
.verify-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:40px;max-width:560px;width:100%}
.verify-card h2{font:700 20px var(--mono);color:var(--cyan);margin-bottom:6px}
.verify-card .sub{font:300 13px var(--sans);color:var(--muted);margin-bottom:28px}
.verify-card label{font:500 10px var(--mono);color:var(--muted);display:block;margin-bottom:5px;margin-top:16px}
.verify-card textarea,.verify-card input{width:100%;background:var(--bg);border:1px solid var(--dim);border-radius:8px;padding:10px 14px;color:var(--text);font:400 12px var(--mono);outline:none;resize:vertical}
.verify-card textarea{min-height:70px}
.verify-card button{width:100%;margin-top:24px;padding:12px;background:var(--cyan);color:var(--bg);font:600 13px var(--mono);border:none;border-radius:8px;cursor:pointer}
.verify-or{text-align:center;color:var(--dim);font:11px var(--mono);margin:4px 0}
#verify-result{margin-top:20px;padding:16px;border-radius:8px;display:none;text-align:center;font:600 15px var(--mono)}
#verify-result.valid{display:block;background:rgba(0,255,136,0.06);border:1px solid rgba(0,255,136,0.2);color:var(--green)}
#verify-result.invalid{display:block;background:rgba(255,51,85,0.06);border:1px solid rgba(255,51,85,0.2);color:var(--red)}
#verify-result .detail{font:400 10px var(--mono);color:var(--muted);margin-top:6px}
</style>
</head>
<body>
<div id="sidebar">
  <div class="sb-logo">
    <svg width="44" height="34" viewBox="0 0 200 160"><defs><linearGradient id="lg" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#0088ff"/><stop offset="50%" stop-color="#00d4ff"/><stop offset="100%" stop-color="#0088ff"/></linearGradient></defs>
    <path d="M30 80 Q55 30 80 80 Q105 130 120 80 Q145 30 170 80" fill="none" stroke="url(#lg)" stroke-width="1.8"/>
    <circle cx="30" cy="80" r="7" fill="#0088ff"/><circle cx="80" cy="80" r="8" fill="#00bbff"/><circle cx="120" cy="80" r="8" fill="#00bbff"/><circle cx="170" cy="80" r="7" fill="#0088ff"/>
    <circle cx="55" cy="38" r="5" fill="#00ff88"/><circle cx="100" cy="122" r="5" fill="#00ff88"/><circle cx="145" cy="38" r="5" fill="#00ff88"/></svg>
    <div><h1>MESHSIG</h1><div class="tag">SECURITY OPS</div></div>
  </div>
  <div class="sb-nav">
    <div class="sb-section">MONITOR</div>
    <div class="sb-item active" data-page="office"><span class="icon">◉</span> Neural Mesh</div>
    <div class="sb-item" data-page="agents"><span class="icon">◈</span> Agents</div>
    <div class="sb-item" data-page="messages"><span class="icon">◆</span> Messages</div>
    <div class="sb-section">SECURITY</div>
    <div class="sb-item" data-page="audit"><span class="icon">◧</span> Audit Report</div>
    <div class="sb-item" data-page="verify"><span class="icon">◇</span> Verify Signature</div>
  </div>
  <div class="sb-stats">
    <div class="sb-stat"><span class="label">AGENTS</span><span class="value" id="sb-agents">0</span></div>
    <div class="sb-stat"><span class="label">CONNECTIONS</span><span class="value" id="sb-links">0</span></div>
    <div class="sb-stat"><span class="label">SIGNED MSGS</span><span class="value" id="sb-msgs">0</span></div>
    <div class="sb-stat"><span class="label">AVG TRUST</span><span class="value" id="sb-trust">—</span></div>
  </div>
  <div class="sb-ws"><div class="pulse off" id="wsd"></div><span id="wsl" style="color:var(--muted)">CONNECTING</span></div>
</div>
<div id="main">
  <div id="topbar"><span id="page-title">Neural Mesh</span><span id="clock"></span></div>
  <div class="page active" id="p-office">
    <canvas id="nn-canvas"></canvas>
    <canvas id="bloom-canvas"></canvas>
    <div class="scanline-overlay"></div>
    <div class="nn-tooltip" id="tip">
      <div class="tt-name" id="tt-n"></div>
      <div class="tt-did" id="tt-d"></div>
      <div class="tt-row">Trust <span class="tv" id="tt-t"></span></div>
      <div class="tt-row">Messages <span class="tv" id="tt-m"></span></div>
      <div class="tt-row">Status <span class="tv" style="color:var(--green)" id="tt-s"></span></div>
      <div id="tt-caps"></div>
    </div>
    <div id="events-panel">
      <div id="events-header"><span>LIVE SECURITY FEED</span><span class="count" id="ev-count">0</span></div>
      <div id="events"></div>
    </div>
  </div>
  <div class="page" id="p-agents"><div class="agents-grid" id="agents-grid"></div></div>
  <div class="page" id="p-messages"><div class="messages-list" id="messages-list"></div></div>
  <div class="page" id="p-audit"><div class="audit-content" id="audit-content"></div></div>
  <div class="page" id="p-verify"><div class="verify-content"><div class="verify-card">
    <h2>VERIFY SIGNATURE</h2><p class="sub">Paste message, signature, and public key or DID.</p>
    <label>MESSAGE</label><textarea id="v-msg"></textarea>
    <label>SIGNATURE</label><input id="v-sig">
    <label>PUBLIC KEY</label><input id="v-pk">
    <div class="verify-or">— or —</div>
    <label>DID</label><input id="v-did">
    <button onclick="doVerify()">VERIFY SIGNATURE</button>
    <div id="verify-result"><div id="vr-text"></div><div class="detail" id="vr-detail"></div></div>
  </div></div></div>
</div>
<script>
// === STATE ===
let agents=[],connections=[],msgCount=0,evCount=0;
const titles={office:'Neural Mesh',agents:'Agents',messages:'Signed Messages',audit:'Audit Report',verify:'Verify Signature'};

// === NEURAL NETWORK ENGINE ===
const CV=document.getElementById('nn-canvas'),X=CV.getContext('2d');
const BCV=document.getElementById('bloom-canvas'),BX=BCV.getContext('2d');
let CW,CH;
const DPR=Math.min(window.devicePixelRatio||1,2);
const nnNodes=[],nnEdges=[],nnParticles=[],nnShockwaves=[],nnSynapses=[],nnAmbient=[];
const PALETTE={management:'#ff6b35',delegation:'#ff6b35','customer-support':'#00d4ff',sales:'#ffcc02',sdr:'#ffcc02',copywriting:'#e040fb','social-media':'#76ff03',analytics:'#448aff',general:'#00d4ff'};

for(let i=0;i<120;i++)nnAmbient.push({x:Math.random()*3000,y:Math.random()*2000,s:Math.random()*1.2+0.2,a:Math.random()*0.08+0.01,dx:(Math.random()-0.5)*0.3,dy:(Math.random()-0.5)*0.3});

function resizeCanvas(){
  const container=CV.parentElement;
  CW=container.clientWidth-320;CH=container.clientHeight;
  CV.width=BCV.width=CW*DPR;CV.height=BCV.height=CH*DPR;
  CV.style.width=BCV.style.width=CW+'px';CV.style.height=BCV.style.height=CH+'px';
  X.setTransform(DPR,0,0,DPR,0,0);BX.setTransform(DPR,0,0,DPR,0,0);
}

// Physics
const PHY={rep:4500,att:0.006,damp:0.88,grav:0.008,len:200};
function physics(){
  const n=nnNodes.length;
  for(let i=0;i<n;i++)for(let j=i+1;j<n;j++){const dx=nnNodes[j].x-nnNodes[i].x,dy=nnNodes[j].y-nnNodes[i].y,d=Math.sqrt(dx*dx+dy*dy)||1,f=PHY.rep/(d*d),fx=dx/d*f,fy=dy/d*f;nnNodes[i].vx-=fx;nnNodes[i].vy-=fy;nnNodes[j].vx+=fx;nnNodes[j].vy+=fy}
  for(const e of nnEdges){const a=nnNodes[e.s],b=nnNodes[e.t];if(!a||!b)continue;const dx=b.x-a.x,dy=b.y-a.y,d=Math.sqrt(dx*dx+dy*dy)||1,f=(d-PHY.len)*PHY.att,fx=dx/d*f,fy=dy/d*f;a.vx+=fx;a.vy+=fy;b.vx-=fx;b.vy-=fy}
  for(const nd of nnNodes){if(nd.dragging)continue;nd.vx+=(CW/2-nd.x)*PHY.grav;nd.vy+=(CH/2-nd.y)*PHY.grav;nd.vx*=PHY.damp;nd.vy*=PHY.damp;nd.x+=nd.vx;nd.y+=nd.vy;nd.x=Math.max(80,Math.min(CW-80,nd.x));nd.y=Math.max(80,Math.min(CH-80,nd.y))}
}

function h2r(h,a){return`rgba(${parseInt(h.slice(1,3),16)},${parseInt(h.slice(3,5),16)},${parseInt(h.slice(5,7),16)},${a})`}

function drawBg(){
  const g=X.createRadialGradient(CW/2,CH/2,0,CW/2,CH/2,CW*.7);g.addColorStop(0,'#0a1628');g.addColorStop(1,'#030810');X.fillStyle=g;X.fillRect(0,0,CW,CH);
  X.strokeStyle='rgba(0,212,255,0.012)';X.lineWidth=0.5;const sz=50;
  for(let x=-sz;x<CW+sz;x+=sz*1.5)for(let y=-sz;y<CH+sz;y+=sz*1.732){const ox=(Math.floor(y/(sz*1.732))%2)*sz*0.75;X.beginPath();for(let i=0;i<6;i++){const a=Math.PI/3*i-Math.PI/6,px=x+ox+sz*0.5*Math.cos(a),py=y+sz*0.5*Math.sin(a);i===0?X.moveTo(px,py):X.lineTo(px,py)}X.closePath();X.stroke()}
  for(const p of nnAmbient){p.x+=p.dx;p.y+=p.dy;if(p.x<0)p.x=CW;if(p.x>CW)p.x=0;if(p.y<0)p.y=CH;if(p.y>CH)p.y=0;X.beginPath();X.arc(p.x,p.y,p.s,0,Math.PI*2);X.fillStyle=`rgba(0,212,255,${p.a})`;X.fill()}
}

function drawEdges(t){
  for(const e of nnEdges){const a=nnNodes[e.s],b=nnNodes[e.t];if(!a||!b)continue;const dx=b.x-a.x,dy=b.y-a.y;
  for(let i=0;i<3;i++){const prog=((t*0.0005+i/3+e.s*0.1)%1);const px=a.x+dx*prog,py=a.y+dy*prog;X.beginPath();X.arc(px,py,1,0,Math.PI*2);X.fillStyle=`rgba(0,212,255,${0.12*(1-Math.abs(prog-0.5)*2)})`;X.fill()}
  const lg=X.createLinearGradient(a.x,a.y,b.x,b.y);lg.addColorStop(0,h2r(a.color,0.12));lg.addColorStop(0.5,'rgba(0,212,255,0.04)');lg.addColorStop(1,h2r(b.color,0.12));X.strokeStyle=lg;X.lineWidth=1;X.beginPath();X.moveTo(a.x,a.y);X.lineTo(b.x,b.y);X.stroke()}
}

function drawNodes(t){
  for(const nd of nnNodes){const p=Math.sin(t*0.002+nd.phase)*0.25+1;
  const fg=X.createRadialGradient(nd.x,nd.y,0,nd.x,nd.y,nd.r*4*p);fg.addColorStop(0,h2r(nd.color,0.08));fg.addColorStop(1,'transparent');X.fillStyle=fg;X.beginPath();X.arc(nd.x,nd.y,nd.r*4*p,0,Math.PI*2);X.fill();
  X.beginPath();X.arc(nd.x,nd.y,nd.r*2.2,0,Math.PI*2);X.strokeStyle=h2r(nd.color,0.06);X.lineWidth=0.5;X.stroke();
  const oa=t*0.003+nd.phase,ox=nd.x+Math.cos(oa)*nd.r*2.2,oy=nd.y+Math.sin(oa)*nd.r*2.2;X.beginPath();X.arc(ox,oy,1.5,0,Math.PI*2);X.fillStyle=h2r(nd.color,0.4);X.fill();
  if(nd.trust>0){X.beginPath();X.arc(nd.x,nd.y,nd.r*1.7,-Math.PI/2,-Math.PI/2+Math.PI*2*nd.trust);X.strokeStyle=h2r(nd.color,0.35);X.lineWidth=2;X.stroke();const ta=-Math.PI/2+Math.PI*2*nd.trust,tx=nd.x+Math.cos(ta)*nd.r*1.7,ty=nd.y+Math.sin(ta)*nd.r*1.7;X.beginPath();X.arc(tx,ty,2,0,Math.PI*2);X.fillStyle=h2r(nd.color,0.6);X.fill()}
  const cg=X.createRadialGradient(nd.x-nd.r*.2,nd.y-nd.r*.2,0,nd.x,nd.y,nd.r);cg.addColorStop(0,h2r(nd.color,0.95));cg.addColorStop(0.6,h2r(nd.color,0.5));cg.addColorStop(1,h2r(nd.color,0.2));X.fillStyle=cg;X.beginPath();X.arc(nd.x,nd.y,nd.r,0,Math.PI*2);X.fill();
  X.beginPath();X.arc(nd.x,nd.y,nd.r*.35,0,Math.PI*2);X.fillStyle=h2r(nd.color,0.95);X.fill();
  if(nd.hover){X.beginPath();X.arc(nd.x,nd.y,nd.r*2.5,0,Math.PI*2);X.strokeStyle=h2r(nd.color,0.3);X.lineWidth=1;X.setLineDash([3,4]);X.stroke();X.setLineDash([])}
  X.fillStyle=nd.hover?'#e8f0f8':'#6a8da8';X.font=(nd.hover?'600':'500')+' '+(nd.hover?12:10)+'px "JetBrains Mono"';X.textAlign='center';X.fillText(nd.name,nd.x,nd.y+nd.r+20);
  if(nd.caps.length){X.fillStyle=h2r(nd.color,nd.hover?0.7:0.35);X.font='400 7px "JetBrains Mono"';X.fillText(nd.caps[0].type.toUpperCase(),nd.x,nd.y+nd.r+31)}
  if(nd.flash&&nd.flash>0){nd.flash-=0.02;const fg2=X.createRadialGradient(nd.x,nd.y,0,nd.x,nd.y,nd.r*5);fg2.addColorStop(0,h2r(nd.color,nd.flash*0.3));fg2.addColorStop(1,'transparent');X.fillStyle=fg2;X.beginPath();X.arc(nd.x,nd.y,nd.r*5,0,Math.PI*2);X.fill();const bg=BX.createRadialGradient(nd.x,nd.y,0,nd.x,nd.y,nd.r*6);bg.addColorStop(0,h2r(nd.color,nd.flash*0.4));bg.addColorStop(1,'transparent');BX.fillStyle=bg;BX.beginPath();BX.arc(nd.x,nd.y,nd.r*6,0,Math.PI*2);BX.fill()}}
}

function drawParticles(){
  for(let i=nnParticles.length-1;i>=0;i--){const p=nnParticles[i];const a=nnNodes[p.si],b=nnNodes[p.ti];if(!a||!b){nnParticles.splice(i,1);continue}
  p.prog+=p.spd;if(p.prog>=1){nnShockwaves.push({x:b.x,y:b.y,r:0,color:p.color,life:1});b.flash=1;nnParticles.splice(i,1);continue}
  const mx=(a.x+b.x)/2,my=(a.y+b.y)/2,nx=-(b.y-a.y)*0.15,ny=(b.x-a.x)*0.15,cx=mx+nx,cy=my+ny;
  const t=p.prog,u=1-t,px=u*u*a.x+2*u*t*cx+t*t*b.x,py=u*u*a.y+2*u*t*cy+t*t*b.y;
  const pg=X.createRadialGradient(px,py,0,px,py,p.sz*5);pg.addColorStop(0,h2r(p.color,0.7));pg.addColorStop(1,'transparent');X.fillStyle=pg;X.beginPath();X.arc(px,py,p.sz*5,0,Math.PI*2);X.fill();
  X.beginPath();X.arc(px,py,p.sz,0,Math.PI*2);X.fillStyle=h2r(p.color,1);X.fill();
  for(let j=1;j<=8;j++){const tt=Math.max(0,t-j*.012),uu=1-tt,tx2=uu*uu*a.x+2*uu*tt*cx+tt*tt*b.x,ty2=uu*uu*a.y+2*uu*tt*cy+tt*tt*b.y;X.beginPath();X.arc(tx2,ty2,p.sz*(1-j/10),0,Math.PI*2);X.fillStyle=h2r(p.color,0.25*(1-j/8));X.fill()}
  BX.beginPath();BX.arc(px,py,p.sz*8,0,Math.PI*2);const bg=BX.createRadialGradient(px,py,0,px,py,p.sz*8);bg.addColorStop(0,h2r(p.color,0.3));bg.addColorStop(1,'transparent');BX.fillStyle=bg;BX.fill()}
}

function drawShockwaves(){
  for(let i=nnShockwaves.length-1;i>=0;i--){const s=nnShockwaves[i];s.r+=2.5;s.life-=0.025;if(s.life<=0){nnShockwaves.splice(i,1);continue}
  X.beginPath();X.arc(s.x,s.y,s.r,0,Math.PI*2);X.strokeStyle=h2r(s.color,s.life*0.4);X.lineWidth=2*s.life;X.stroke();
  X.beginPath();X.arc(s.x,s.y,s.r*0.5,0,Math.PI*2);X.strokeStyle=h2r(s.color,s.life*0.15);X.lineWidth=1;X.stroke();
  BX.beginPath();BX.arc(s.x,s.y,s.r*1.5,0,Math.PI*2);const bg=BX.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r*1.5);bg.addColorStop(0,h2r(s.color,s.life*0.15));bg.addColorStop(1,'transparent');BX.fillStyle=bg;BX.fill()}
}

function drawSynapses(){
  if(Math.random()<0.02&&nnEdges.length>0){const e=nnEdges[Math.floor(Math.random()*nnEdges.length)];const a=nnNodes[e.s],b=nnNodes[e.t];if(a&&b)nnSynapses.push({ax:a.x,ay:a.y,bx:b.x,by:b.y,life:1,color:'#00d4ff'})}
  for(let i=nnSynapses.length-1;i>=0;i--){const s=nnSynapses[i];s.life-=0.03;if(s.life<=0){nnSynapses.splice(i,1);continue}X.beginPath();X.moveTo(s.ax,s.ay);X.lineTo(s.bx,s.by);X.strokeStyle=h2r(s.color,s.life*0.2);X.lineWidth=s.life*2;X.stroke()}
}

// Interaction
let dragNode=null,hoverNode=null;
CV.style.cursor='crosshair';
CV.addEventListener('mousedown',e=>{const r=CV.getBoundingClientRect();const nd=hitTest(e.clientX-r.left,e.clientY-r.top);if(nd){dragNode=nd;nd.dragging=true;CV.style.cursor='grabbing'}});
CV.addEventListener('mousemove',e=>{const r=CV.getBoundingClientRect();const mx=e.clientX-r.left,my=e.clientY-r.top;
  if(dragNode){dragNode.x=mx;dragNode.y=my;dragNode.vx=0;dragNode.vy=0;return}
  const nd=hitTest(mx,my);if(nd!==hoverNode){if(hoverNode)hoverNode.hover=false;hoverNode=nd;if(nd){nd.hover=true;showTip(nd,e.clientX,e.clientY);CV.style.cursor='pointer'}else{hideTip();CV.style.cursor='crosshair'}}
  if(nd)updateTipPos(e.clientX,e.clientY)});
CV.addEventListener('mouseup',()=>{if(dragNode){dragNode.dragging=false;dragNode=null;CV.style.cursor='crosshair'}});
CV.addEventListener('mouseleave',()=>{if(hoverNode){hoverNode.hover=false;hoverNode=null}hideTip()});
function hitTest(mx,my){for(let i=nnNodes.length-1;i>=0;i--){const nd=nnNodes[i],dx=mx-nd.x,dy=my-nd.y;if(dx*dx+dy*dy<(nd.r*2.5)**2)return nd}return null}

const tip=document.getElementById('tip');
function showTip(nd,mx,my){document.getElementById('tt-n').textContent=nd.name;document.getElementById('tt-d').textContent=nd.id;document.getElementById('tt-t').textContent=(nd.trust*100).toFixed(0)+'%';document.getElementById('tt-m').textContent=nd.mc||0;document.getElementById('tt-s').textContent='ONLINE';
  const cc=document.getElementById('tt-caps');cc.innerHTML='';for(const c of nd.caps){const sp=document.createElement('span');sp.className='tt-cap';sp.style.background=h2r(PALETTE[c.type]||'#00d4ff',0.1);sp.style.color=PALETTE[c.type]||'#00d4ff';sp.style.border='1px solid '+h2r(PALETTE[c.type]||'#00d4ff',0.2);sp.textContent=c.type;cc.appendChild(sp)}
  tip.style.display='block';updateTipPos(mx,my)}
function updateTipPos(mx,my){const r=tip.getBoundingClientRect();let x=mx+16,y=my-10;if(x+r.width>window.innerWidth-20)x=mx-r.width-16;if(y+r.height>window.innerHeight-20)y=window.innerHeight-r.height-20;tip.style.left=x+'px';tip.style.top=y+'px'}
function hideTip(){tip.style.display='none'}

// Bridge: old API -> neural network
function syncAgentChars(){
  for(const a of agents){
    if(nnNodes.find(n=>n.id===a.did))continue;
    const ang=Math.random()*Math.PI*2,d=100+Math.random()*120;
    const isMgr=(a.capabilities||[]).some(c=>c.type==='management'||c.type==='delegation');
    nnNodes.push({id:a.did,name:a.displayName||'?',x:CW/2+Math.cos(ang)*d,y:CH/2+Math.sin(ang)*d,vx:0,vy:0,
      r:isMgr?16:11,color:PALETTE[(a.capabilities||[])[0]?.type]||PALETTE.general,trust:a.trustScore||0,
      caps:a.capabilities||[],phase:Math.random()*Math.PI*2,hover:false,dragging:false,flash:0,mc:0})}
  for(const c of connections){
    const ai=nnNodes.findIndex(n=>n.id===c.agentADid),bi=nnNodes.findIndex(n=>n.id===c.agentBDid);
    if(ai===-1||bi===-1)continue;
    if(!nnEdges.find(e=>(e.s===ai&&e.t===bi)||(e.s===bi&&e.t===ai)))nnEdges.push({s:ai,t:bi})}
}

function addP(fromDid,toDid,text){
  const ai=nnNodes.findIndex(n=>n.id===fromDid),bi=nnNodes.findIndex(n=>n.id===toDid);
  if(ai===-1||bi===-1)return;
  nnNodes[ai].mc=(nnNodes[ai].mc||0)+1;
  nnParticles.push({si:ai,ti:bi,prog:0,color:'#00ff88',spd:0.01+Math.random()*0.006,sz:3.5});
  setTimeout(()=>{if(ai<nnNodes.length&&bi<nnNodes.length)nnParticles.push({si:ai,ti:bi,prog:0,color:'#00d4ff',spd:0.008+Math.random()*0.004,sz:2})},120);
}

function render(t){
  physics();X.clearRect(0,0,CW,CH);BX.clearRect(0,0,CW,CH);
  drawBg();drawSynapses();drawEdges(t);drawParticles();drawShockwaves();drawNodes(t);
  requestAnimationFrame(render)}

// === NAV ===
document.querySelectorAll('.sb-item').forEach(el=>{el.addEventListener('click',()=>{document.querySelectorAll('.sb-item').forEach(e=>e.classList.remove('active'));el.classList.add('active');const pg=el.dataset.page;document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById('p-'+pg).classList.add('active');document.getElementById('page-title').textContent=titles[pg]||pg;if(pg==='agents')renderAgentsPage();if(pg==='messages')renderMessagesPage();if(pg==='audit')renderAuditPage();if(pg==='office'){resizeCanvas();render()}})});
setInterval(()=>{document.getElementById('clock').textContent=new Date().toLocaleTimeString('en-US',{hour12:false})+' UTC'},1000);

// === EVENTS ===
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
const evDiv=document.getElementById('events');
function addEv(type,html){evCount++;document.getElementById('ev-count').textContent=evCount;const el=document.createElement('div');el.className='ev '+type;el.innerHTML='<span class="ts">'+new Date().toLocaleTimeString('en-US',{hour12:false})+'</span> '+html;evDiv.prepend(el);while(evDiv.children.length>80)evDiv.removeChild(evDiv.lastChild)}
function updateStats(){document.getElementById('sb-agents').textContent=agents.length;document.getElementById('sb-links').textContent=connections.length;document.getElementById('sb-msgs').textContent=msgCount;const ts=agents.map(n=>n.trustScore||0).filter(t=>t>0);document.getElementById('sb-trust').textContent=ts.length?(ts.reduce((a,b)=>a+b,0)/ts.length*100).toFixed(0)+'%':'—'}

// Audio
let audioCtx=null;function playBeep(f,d,v){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.frequency.value=f;o.type='sine';g.gain.setValueAtTime(v,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d);o.start();o.stop(audioCtx.currentTime+d)}
function playMsg(){playBeep(1200,0.06,0.08);setTimeout(()=>playBeep(1600,0.04,0.06),70)}
function playJoin(){playBeep(600,0.1,0.06);setTimeout(()=>playBeep(900,0.08,0.05),120)}
document.addEventListener('click',()=>{if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()},{once:true});

// === PAGES ===
function renderAgentsPage(){const g=document.getElementById('agents-grid');g.innerHTML='';for(const a of agents){const caps=(a.capabilities||[]).map(c=>'<span class="ac-cap">'+esc(c.type)+'</span>').join('');g.innerHTML+='<div class="agent-card"><div class="ac-header"><div class="ac-dot" style="background:#00d4ff"></div><span class="ac-name">'+esc(a.displayName)+'</span></div><div class="ac-did">'+esc(a.did)+'</div><div class="ac-row"><span class="ac-label">Trust</span><span class="ac-value">'+((a.trustScore||0)*100).toFixed(1)+'%</span></div><div class="ac-row"><span class="ac-label">Status</span><span class="ac-value" style="color:var(--green)">Online</span></div><div class="ac-caps">'+caps+'</div></div>'}if(!agents.length)g.innerHTML='<div style="color:var(--dim);padding:40px;font:14px var(--mono);text-align:center">No agents</div>'}
async function renderMessagesPage(){const l=document.getElementById('messages-list');l.innerHTML='Loading...';try{const hdrs={};const t=new URLSearchParams(location.search).get('token');if(t)hdrs['Authorization']='Bearer '+t;const r=await fetch('/messages?limit=100',{headers:hdrs});const d=await r.json();const msgs=d.messages||[];if(!msgs.length){l.innerHTML='<div style="color:var(--dim);padding:40px;text-align:center">No messages</div>';return}l.innerHTML='';for(const m of msgs.reverse()){const from=agents.find(n=>n.did===m.fromDid)?.displayName||'?';const to=agents.find(n=>n.did===m.toDid)?.displayName||'?';const badge=m.verified?'<span class="msg-badge valid">VERIFIED ✓</span>':'<span class="msg-badge invalid">FAILED</span>';l.innerHTML+='<div class="msg-row"><div class="msg-header"><span class="msg-from">'+esc(from)+'</span><span class="msg-arrow">→</span><span class="msg-to">'+esc(to)+'</span>'+badge+'</div><div class="msg-body">'+esc((m.content||'').slice(0,300))+'</div><div class="msg-sig">sig: '+esc((m.signature||'').slice(0,60))+'...</div></div>'}}catch(e){l.innerHTML='Error: '+esc(e.message)}}
async function renderAuditPage(){const c=document.getElementById('audit-content');c.innerHTML='Loading...';try{const hdrs={};const t=new URLSearchParams(location.search).get('token');if(t)hdrs['Authorization']='Bearer '+t;const r=await fetch('/audit/export',{headers:hdrs});const d=await r.json();const s=d.summary;c.innerHTML='<div class="audit-summary"><div class="audit-card"><div class="val">'+esc(s.totalAgents)+'</div><div class="lbl">AGENTS</div></div><div class="audit-card"><div class="val">'+esc(s.totalConnections)+'</div><div class="lbl">CONNECTIONS</div></div><div class="audit-card amber"><div class="val">'+esc(s.totalMessages)+'</div><div class="lbl">MESSAGES</div></div><div class="audit-card green"><div class="val">'+esc(s.verifiedMessages)+'</div><div class="lbl">VERIFIED</div></div><div class="audit-card red"><div class="val">'+esc(s.failedVerifications)+'</div><div class="lbl">FAILED</div></div></div><div class="audit-actions"><button class="audit-btn" onclick="downloadAudit()">Download JSON</button></div><div class="audit-json">'+esc(JSON.stringify(d,null,2))+'</div>';window._auditData=d}catch(e){c.innerHTML='Error: '+esc(e.message)}}
function downloadAudit(){if(!window._auditData)return;const b=new Blob([JSON.stringify(window._auditData,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='meshsig-audit.json';a.click()}
async function doVerify(){const msg=document.getElementById('v-msg').value.trim(),sig=document.getElementById('v-sig').value.trim(),pk=document.getElementById('v-pk').value.trim(),did=document.getElementById('v-did').value.trim();const r=document.getElementById('verify-result'),rt=document.getElementById('vr-text'),rd=document.getElementById('vr-detail');if(!msg||!sig||(!pk&&!did)){r.className='invalid';r.style.display='block';rt.textContent='Fill all fields';return}const body={message:msg,signature:sig};if(did)body.did=did;else body.publicKey=pk;try{const res=await fetch('/verify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const d=await res.json();if(d.valid){r.className='valid';rt.textContent='✓ VALID';rd.textContent='Verified at '+d.verifiedAt}else{r.className='invalid';rt.textContent='✗ INVALID';rd.textContent='No match'}}catch(e){r.className='invalid';rt.textContent='Error';rd.textContent=e.message}}

// === WEBSOCKET ===
let ws;function connectWs(){const p=location.protocol==='https:'?'wss:':'ws:';const params=new URLSearchParams(location.search);const token=params.get('token')||'';const wsUrl=p+'//'+location.host+'?role=dashboard'+(token?'&token='+encodeURIComponent(token):'');ws=new WebSocket(wsUrl);ws.onopen=()=>{document.getElementById('wsd').className='pulse';document.getElementById('wsl').textContent='LIVE';document.getElementById('wsl').style.color='var(--green)';addEv('system','<span style="color:var(--green)">● CONNECTED</span> to MeshSig')};ws.onmessage=e=>{try{handle(JSON.parse(e.data))}catch{}};ws.onclose=()=>{document.getElementById('wsd').className='pulse off';document.getElementById('wsl').textContent='OFFLINE';document.getElementById('wsl').style.color='var(--red)';setTimeout(connectWs,2000)}}
function handle(ev){switch(ev.type){
case 'snapshot':agents=[];connections=[];for(const a of ev.data.agents)agents.push({...a,online:true});for(const c of ev.data.connections)connections.push(c);syncAgentChars();updateStats();addEv('system','Loaded <strong>'+esc(agents.length)+'</strong> agents, <strong>'+esc(connections.length)+'</strong> connections');break;
case 'agent:register':{const d=ev.data;if(!agents.find(n=>n.did===d.did)){agents.push({did:d.did,displayName:d.name,capabilities:d.capabilities,publicKey:d.publicKey,trustScore:d.trustScore||0,online:true,origin:d.origin||'local'});syncAgentChars();updateStats();playJoin()}addEv('join','<span class="from">'+esc(d.name)+'</span> joined <span class="badge ok">IDENTITY</span>');break}
case 'connection:established':{const d=ev.data;connections.push({agentADid:d.agentA.did,agentBDid:d.agentB.did});syncAgentChars();updateStats();addEv('handshake','<span class="from">'+esc(d.agentA.name)+'</span><span class="arrow">⟷</span><span class="to">'+esc(d.agentB.name)+'</span> <span class="badge ok">HANDSHAKE</span>');break}
case 'message:sent':{const d=ev.data;msgCount++;updateStats();addP(d.from?.did,d.to?.did,d.preview);const v=d.verified?'<span class="badge ok">SIGNED ✓</span>':'<span class="badge fail">UNVERIFIED</span>';addEv('message','<span class="from">'+esc(d.from?.name||'?')+'</span><span class="arrow">→</span><span class="to">'+esc(d.to?.name||'?')+'</span> '+v+'<span class="content">'+esc(d.preview||'')+'</span>');playMsg();break}
case 'handshake:verify':{const d=ev.data;addEv('handshake','<span class="from">'+esc(d.fromName)+'</span><span class="arrow">⟷</span><span class="to">'+esc(d.toName)+'</span> <span class="badge ok">Ed25519</span>');break}
case 'agent:removed':{const d=ev.data;agents=agents.filter(a=>a.did!==d.did);const i=nnNodes.findIndex(n=>n.id===d.did);if(i!==-1)nnNodes.splice(i,1);updateStats();addEv('system','<span style="color:var(--red)">✗</span> Agent removed');break}}}

// === INIT ===
resizeCanvas();render(0);connectWs();window.addEventListener('resize',resizeCanvas);
</script>
