<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeshSig — Live Network</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #06080f;
    color: #e2e8f0;
    font-family: 'Inter', sans-serif;
    height: 100vh;
    overflow: hidden;
  }

  /* -- Header ------------------------------------------------------------ */
  #header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 24px;
    background: rgba(6,8,15,0.92);
    border-bottom: 1px solid #1a1f2e;
    backdrop-filter: blur(12px);
  }
  #header .logo { display: flex; align-items: center; gap: 10px; }
  #header .logo-icon {
    width: 32px; height: 32px; border-radius: 8px;
    background: linear-gradient(135deg, #3b82f6, #8b5cf6);
    display: flex; align-items: center; justify-content: center;
    font: 700 16px 'JetBrains Mono', monospace; color: white;
  }
  #header h1 { font-size: 18px; font-weight: 700; }
  #header .subtitle { font: 11px 'JetBrains Mono', monospace; color: #64748b; }

  #stats { display: flex; gap: 28px; font: 12px 'JetBrains Mono', monospace; }
  .stat { display: flex; flex-direction: column; align-items: center; }
  .stat .value { font-size: 22px; font-weight: 700; color: #3b82f6; }
  .stat .label { color: #64748b; margin-top: 2px; font-size: 10px; letter-spacing: 0.05em; }

  #ws-status {
    position: fixed; top: 18px; right: 24px; z-index: 20;
    font: 11px 'JetBrains Mono', monospace; display: flex; align-items: center; gap: 6px;
  }
  .ws-dot { width: 8px; height: 8px; border-radius: 50%; }
  .ws-dot.on { background: #10b981; box-shadow: 0 0 8px #10b981; }
  .ws-dot.off { background: #ef4444; box-shadow: 0 0 8px #ef4444; }

  /* -- Graph ------------------------------------------------------------- */
  #graph { width: 100vw; height: 100vh; }
  svg text { user-select: none; }
  .connection-line { stroke-dasharray: 5 5; animation: dash 15s linear infinite; }
  @keyframes dash { to { stroke-dashoffset: -80; } }
  @keyframes fadeIn { to { opacity: 1; } }

  /* -- Legend ------------------------------------------------------------- */
  #legend {
    position: fixed; top: 70px; left: 20px; z-index: 10;
    background: rgba(10, 14, 23, 0.9); border: 1px solid #1e2a3a; border-radius: 10px;
    padding: 14px 18px; font: 11px 'JetBrains Mono', monospace;
    backdrop-filter: blur(8px); max-width: 220px;
  }
  #legend h3 { font-size: 10px; color: #64748b; letter-spacing: 0.08em; margin-bottom: 10px; }
  .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; color: #94a3b8; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .legend-line { width: 20px; height: 2px; flex-shrink: 0; border-top: 2px dashed; }
  .legend-particle { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  /* -- Event Log --------------------------------------------------------- */
  #events-panel {
    position: fixed; bottom: 0; right: 0; z-index: 10;
    width: 420px; max-height: 45vh;
    background: rgba(10, 14, 23, 0.95);
    border-top: 1px solid #1e2a3a;
    border-left: 1px solid #1e2a3a;
    border-radius: 12px 0 0 0;
    backdrop-filter: blur(12px);
    display: flex; flex-direction: column;
  }
  #events-header {
    padding: 10px 16px; border-bottom: 1px solid #1e2a3a;
    font: 600 10px 'JetBrains Mono', monospace; color: #64748b;
    letter-spacing: 0.08em; flex-shrink: 0;
  }
  #events {
    flex: 1; overflow-y: auto; padding: 8px 16px;
    font: 11px 'JetBrains Mono', monospace;
    display: flex; flex-direction: column;
  }
  #events::-webkit-scrollbar { width: 4px; }
  #events::-webkit-scrollbar-thumb { background: #2d3748; border-radius: 2px; }

  .ev {
    padding: 5px 0; opacity: 0; animation: fadeIn 0.3s forwards;
    line-height: 1.5; border-bottom: 1px solid rgba(30,42,58,0.3);
  }
  .ev:last-child { border-bottom: none; }
  .ev .time { color: #475569; }
  .ev .icon { margin: 0 4px; }
  .ev.register { color: #10b981; }
  .ev.connection { color: #3b82f6; }
  .ev.message { color: #e2e8f0; }
  .ev.handshake { color: #8b5cf6; }
  .ev.trust { color: #f59e0b; }
  .ev.peer { color: #ec4899; }
  .ev .msg-content {
    display: block; margin-top: 2px; padding: 4px 8px;
    background: rgba(245, 158, 11, 0.08); border-left: 2px solid #f59e0b;
    border-radius: 0 4px 4px 0; color: #f59e0b; font-size: 10px;
  }
  .ev .verified { color: #10b981; }
  .ev .agent-name { font-weight: 600; color: #e2e8f0; }

  /* -- Message Bubble on graph ------------------------------------------ */
  .msg-bubble {
    position: fixed; z-index: 15; pointer-events: none;
    background: rgba(245, 158, 11, 0.12); border: 1px solid rgba(245, 158, 11, 0.3);
    border-radius: 8px; padding: 6px 10px; max-width: 250px;
    font: 10px 'JetBrains Mono', monospace; color: #f59e0b;
    opacity: 0; transition: opacity 0.3s;
  }
  .msg-bubble.show { opacity: 1; }
</style>
</head>
<body>

<div id="header">
  <div class="logo">
    <div class="logo-icon">M</div>
    <div>
      <h1>MeshSig</h1>
      <div class="subtitle">LIVE NETWORK</div>
    </div>
  </div>
  <div id="stats">
    <div class="stat"><span class="value" id="s-agents">0</span><span class="label">AGENTS</span></div>
    <div class="stat"><span class="value" id="s-links">0</span><span class="label">LINKS</span></div>
    <div class="stat"><span class="value" id="s-msgs">0</span><span class="label">MESSAGES</span></div>
    <div class="stat"><span class="value" id="s-trust">—</span><span class="label">AVG TRUST</span></div>
  </div>
</div>

<div id="ws-status"><div class="ws-dot off" id="wsd"></div><span id="wsl" style="color:#64748b">connecting...</span></div>

<div id="legend">
  <h3>LEGEND</h3>
  <div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div> Coordinator agent</div>
  <div class="legend-item"><div class="legend-dot" style="background:#3b82f6"></div> Data / Analysis agent</div>
  <div class="legend-item"><div class="legend-dot" style="background:#8b5cf6"></div> Code / QA agent</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ec4899"></div> Writing agent</div>
  <div class="legend-item"><div class="legend-dot" style="background:#10b981"></div> Research agent</div>
  <div class="legend-item" style="margin-top:8px"><div class="legend-line" style="border-color:#1e3a5f"></div> Verified connection</div>
  <div class="legend-item"><div class="legend-particle" style="background:#f59e0b"></div> Signed message</div>
  <div class="legend-item" style="margin-top:8px;color:#64748b;font-size:10px">Node size = trust score<br>Line thickness = connection trust</div>
</div>

<div id="events-panel">
  <div id="events-header">LIVE EVENTS</div>
  <div id="events"></div>
</div>

<svg id="graph"></svg>

<!-- Message bubble that appears on graph -->
<div class="msg-bubble" id="msg-bubble"></div>

<script>
const COLORS = {
  link: '#1e3a5f', linkActive: '#3b82f6', message: '#f59e0b',
  register: '#10b981', handshake: '#8b5cf6',
};
const CAP_COLORS = {
  'orchestration':'#ef4444','strategy':'#ef4444','data-analysis':'#3b82f6',
  'market-research':'#10b981','code-review':'#8b5cf6','qa':'#8b5cf6',
  'writing':'#ec4899','default':'#3b82f6',
};
function agentColor(caps) {
  if (!caps || !caps.length) return CAP_COLORS.default;
  return CAP_COLORS[caps[0].type] || CAP_COLORS.default;
}

let nodes=[], links=[], msgCount=0, simulation;
const W=window.innerWidth, H=window.innerHeight;

const svg=d3.select('#graph').attr('width',W).attr('height',H);
const defs=svg.append('defs');
const pat=defs.append('pattern').attr('id','grid').attr('width',40).attr('height',40).attr('patternUnits','userSpaceOnUse');
pat.append('circle').attr('cx',20).attr('cy',20).attr('r',0.5).attr('fill','#1a1f2e');
svg.append('rect').attr('width',W).attr('height',H).attr('fill','url(#grid)');

const linkG=svg.append('g'), nodeG=svg.append('g'), labelG=svg.append('g'), particleG=svg.append('g');

simulation=d3.forceSimulation(nodes)
  .force('link',d3.forceLink(links).id(d=>d.did).distance(160).strength(0.3))
  .force('charge',d3.forceManyBody().strength(-500))
  .force('center',d3.forceCenter(W/2,H/2))
  .force('collision',d3.forceCollide().radius(50))
  .on('tick',tick);

function tick(){
  linkG.selectAll('line').attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
  nodeG.selectAll('.glow').attr('cx',d=>d.x).attr('cy',d=>d.y);
  nodeG.selectAll('.core').attr('cx',d=>d.x).attr('cy',d=>d.y);
  labelG.selectAll('.nm').attr('x',d=>d.x).attr('y',d=>d.y+26);
  labelG.selectAll('.cap').attr('x',d=>d.x).attr('y',d=>d.y+38);
}

function updateGraph(){
  // Links
  const lk=linkG.selectAll('line').data(links,d=>(d.source.did||d.source)+'-'+(d.target.did||d.target));
  lk.exit().remove();
  lk.enter().append('line').attr('class','connection-line')
    .attr('stroke',COLORS.link).attr('stroke-width',d=>1.5+(d.trustScore||0)*4)
    .attr('stroke-opacity',0).transition().duration(800).attr('stroke-opacity',d=>0.25+(d.trustScore||0)*0.6);
  lk.transition().duration(500).attr('stroke-width',d=>1.5+(d.trustScore||0)*4).attr('stroke-opacity',d=>0.25+(d.trustScore||0)*0.6);

  // Glows
  const gl=nodeG.selectAll('.glow').data(nodes,d=>d.did);
  gl.exit().remove();
  gl.enter().append('circle').attr('class','glow').attr('r',d=>d.online?24:14)
    .attr('fill',d=>agentColor(d.capabilities)).attr('opacity',0).transition().duration(600).attr('opacity',d=>d.online?0.2:0.05);

  // Cores
  const nd=nodeG.selectAll('.core').data(nodes,d=>d.did);
  nd.exit().transition().duration(300).attr('r',0).remove();
  nd.enter().append('circle').attr('class','core').attr('r',0)
    .attr('fill',d=>agentColor(d.capabilities))
    .attr('stroke',d=>d.online?'#fff':'#555').attr('stroke-width',d=>d.online?2:1).attr('stroke-opacity',d=>d.online?0.5:0.15)
    .attr('cursor','pointer')
    .call(d3.drag().on('start',(e,d)=>{if(!e.active)simulation.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y;})
      .on('drag',(e,d)=>{d.fx=e.x;d.fy=e.y;}).on('end',(e,d)=>{if(!e.active)simulation.alphaTarget(0);d.fx=null;d.fy=null;}))
    .on('mouseover',function(e,d){d3.select(this).transition().attr('r',14).attr('stroke-opacity',1);showTip(e,d);})
    .on('mouseout',function(e,d){d3.select(this).transition().attr('r',7+d.trustScore*5).attr('stroke-opacity',d.online?0.5:0.15);hideTip();})
    .transition().duration(600).attr('r',d=>7+d.trustScore*5);

  // Names
  const nm=labelG.selectAll('.nm').data(nodes,d=>d.did);
  nm.exit().remove();
  nm.enter().append('text').attr('class','nm').attr('text-anchor','middle')
    .attr('fill',d=>d.online?'#e2e8f0':'#64748b').attr('font-size','12px').attr('font-weight','600')
    .attr('font-family','Inter,sans-serif').attr('opacity',0).text(d=>d.displayName)
    .transition().duration(600).attr('opacity',1);

  // Caps + trust
  const cp=labelG.selectAll('.cap').data(nodes,d=>d.did);
  cp.exit().remove();
  cp.enter().append('text').attr('class','cap').attr('text-anchor','middle')
    .attr('fill','#64748b').attr('font-size','9px').attr('font-family','JetBrains Mono,monospace')
    .attr('opacity',0).text(d=>capLabel(d)).transition().duration(600).attr('opacity',1);
  labelG.selectAll('.cap').text(d=>capLabel(d));

  simulation.nodes(nodes);
  simulation.force('link').links(links);
  simulation.alpha(0.5).restart();
}

function capLabel(d){
  const c=(d.capabilities||[]).map(c=>c.type).join(', ');
  const t=d.trustScore>0?` · ${(d.trustScore*100).toFixed(0)}% trust`:'';
  return c+t;
}

// -- Message animation with content ------------------------------------------
function animateMsg(fromDid,toDid,preview){
  const s=nodes.find(n=>n.did===fromDid), t=nodes.find(n=>n.did===toDid);
  if(!s||!t)return;

  // Larger visible particle
  const p=particleG.append('circle').attr('r',5).attr('fill',COLORS.message)
    .attr('cx',s.x).attr('cy',s.y).attr('opacity',1)
    .attr('filter','url(#msgGlow)');

  // Trail
  const trail=particleG.append('circle').attr('r',3).attr('fill',COLORS.message)
    .attr('cx',s.x).attr('cy',s.y).attr('opacity',0.4);

  // Flash the link
  linkG.selectAll('line')
    .filter(d=>(d.source.did===fromDid&&d.target.did===toDid)||(d.source.did===toDid&&d.target.did===fromDid))
    .transition().duration(200).attr('stroke',COLORS.message).attr('stroke-width',4)
    .transition().duration(1000).attr('stroke',COLORS.link).attr('stroke-width',d=>1.5+(d.trustScore||0)*4);

  // Show message bubble on graph
  if(preview){
    const bubble=document.getElementById('msg-bubble');
    const mx=(s.x+t.x)/2, my=(s.y+t.y)/2-30;
    bubble.textContent=`"${preview.slice(0,60)}"`;
    bubble.style.left=mx+'px';
    bubble.style.top=my+'px';
    bubble.classList.add('show');
    setTimeout(()=>bubble.classList.remove('show'),2500);
  }

  p.transition().duration(1500).ease(d3.easeCubicInOut)
    .attr('cx',t.x).attr('cy',t.y).attr('r',8).attr('opacity',0).remove();
  trail.transition().duration(1500).delay(100).ease(d3.easeCubicInOut)
    .attr('cx',t.x).attr('cy',t.y).attr('opacity',0).remove();
}

// Glow filter for particles
const filter=defs.append('filter').attr('id','msgGlow');
filter.append('feGaussianBlur').attr('stdDeviation','3').attr('result','blur');
const merge=filter.append('feMerge');
merge.append('feMergeNode').attr('in','blur');
merge.append('feMergeNode').attr('in','SourceGraphic');

function flashNode(did,color){
  const n=nodes.find(n=>n.did===did);if(!n)return;
  particleG.append('circle').attr('cx',n.x||W/2).attr('cy',n.y||H/2)
    .attr('r',8).attr('fill','none').attr('stroke',color).attr('stroke-width',2).attr('opacity',1)
    .transition().duration(1000).attr('r',40).attr('opacity',0).remove();
}

// -- Tooltip -----------------------------------------------------------------
let tipEl=null;
function showTip(e,d){
  if(!tipEl){tipEl=document.createElement('div');tipEl.style.cssText='position:fixed;background:#111827;border:1px solid #2d3748;border-radius:10px;padding:14px 18px;font:12px JetBrains Mono,monospace;color:#e2e8f0;pointer-events:none;z-index:100;max-width:300px;box-shadow:0 8px 32px rgba(0,0,0,0.5);';document.body.appendChild(tipEl);}
  tipEl.innerHTML=`
    <div style="font-weight:700;font-size:14px;margin-bottom:8px;color:${agentColor(d.capabilities)}">${d.displayName}</div>
    <div style="color:#64748b;margin-bottom:6px;font-size:10px">${d.did.slice(0,35)}...</div>
    <div style="margin-bottom:4px">${d.online?'<span style="color:#10b981">● Online</span>':'<span style="color:#64748b">○ Offline</span>'}</div>
    <div style="margin-bottom:4px">Trust: <strong>${(d.trustScore*100).toFixed(1)}%</strong></div>
    <div style="margin-bottom:4px">Interactions: ${d.interactionsTotal||0}</div>
    <div style="color:#94a3b8;margin-top:6px;font-size:10px">${(d.capabilities||[]).map(c=>`${c.type} ${c.confidence?(c.confidence*100).toFixed(0)+'%':''}`).join('<br>')}</div>
  `;
  tipEl.style.display='block';tipEl.style.left=(e.pageX+16)+'px';tipEl.style.top=(e.pageY-16)+'px';
}
function hideTip(){if(tipEl)tipEl.style.display='none';}

// -- Events ------------------------------------------------------------------
const evDiv=document.getElementById('events');
function addEv(type,html){
  const el=document.createElement('div');
  el.className='ev '+type;
  const t=new Date().toLocaleTimeString();
  el.innerHTML=`<span class="time">${t}</span>${html}`;
  evDiv.prepend(el);
  while(evDiv.children.length>80)evDiv.removeChild(evDiv.lastChild);
}

function updateStats(){
  document.getElementById('s-agents').textContent=nodes.length;
  document.getElementById('s-links').textContent=links.length;
  document.getElementById('s-msgs').textContent=msgCount;
  const ts=nodes.map(n=>n.trustScore||0).filter(t=>t>0);
  document.getElementById('s-trust').textContent=ts.length?(ts.reduce((a,b)=>a+b,0)/ts.length*100).toFixed(0)+'%':'—';
}

// -- WebSocket ---------------------------------------------------------------
let ws;
function connectWs(){
  const proto=location.protocol==='https:'?'wss:':'ws:';
  ws=new WebSocket(`${proto}//${location.host}?role=dashboard`);
  ws.onopen=()=>{
    document.getElementById('wsd').className='ws-dot on';
    document.getElementById('wsl').textContent='live';
    document.getElementById('wsl').style.color='#10b981';
    addEv('register','<span class="icon">🟢</span> Connected to MeshSig');
  };
  ws.onmessage=e=>{try{handle(JSON.parse(e.data));}catch{}};
  ws.onclose=()=>{
    document.getElementById('wsd').className='ws-dot off';
    document.getElementById('wsl').textContent='reconnecting...';
    document.getElementById('wsl').style.color='#ef4444';
    setTimeout(connectWs,2000);
  };
}

function handle(ev){
  switch(ev.type){

    case 'snapshot':{
      nodes.length=0;links.length=0;
      for(const a of ev.data.agents){
        nodes.push({did:a.did,displayName:a.displayName,capabilities:a.capabilities,publicKey:a.publicKey,
          trustScore:a.trustScore||0,online:a.online!==false,interactionsTotal:a.interactionsTotal||0});
      }
      for(const c of ev.data.connections){
        links.push({source:c.agentADid,target:c.agentBDid,channelId:c.channelId,
          trustScore:c.trustScore||0,messagesExchanged:c.messagesExchanged||0});
      }
      updateGraph();updateStats();
      addEv('register',`<span class="icon">📡</span> Loaded <strong>${nodes.length}</strong> agents and <strong>${links.length}</strong> connections`);
      break;
    }

    case 'agent:register':{
      const d=ev.data;
      if(!nodes.find(n=>n.did===d.did)){
        nodes.push({did:d.did,displayName:d.name,capabilities:d.capabilities,publicKey:d.publicKey,
          trustScore:0,online:true,interactionsTotal:0,
          x:W/2+(Math.random()-0.5)*100,y:H/2+(Math.random()-0.5)*100});
        updateGraph();updateStats();
        setTimeout(()=>flashNode(d.did,COLORS.register),100);
      }
      const caps=(d.capabilities||[]).map(c=>c.type).join(', ');
      addEv('register',`<span class="icon">🟢</span> <span class="agent-name">${d.name}</span> joined the mesh${caps?' — '+caps:''}`);
      break;
    }

    case 'connection:established':{
      const d=ev.data;
      if(!links.find(l=>(l.source.did||l.source)===d.agentA.did&&(l.target.did||l.target)===d.agentB.did)){
        links.push({source:d.agentA.did,target:d.agentB.did,channelId:d.channelId,trustScore:0,messagesExchanged:0});
        updateGraph();updateStats();
      }
      addEv('connection',`<span class="icon">🔗</span> <span class="agent-name">${d.agentA.name}</span> ↔ <span class="agent-name">${d.agentB.name}</span> — verified handshake ✓`);
      break;
    }

    case 'message:sent':{
      const d=ev.data;
      msgCount++;updateStats();
      animateMsg(d.from.did,d.to.did,d.preview);
      // Update trust on nodes
      const fn=nodes.find(n=>n.did===d.from.did);
      if(fn&&d.from.trustScore!==undefined)fn.trustScore=d.from.trustScore;
      // Update trust on link
      const lk=links.find(l=>
        ((l.source.did||l.source)===d.from.did&&(l.target.did||l.target)===d.to.did)||
        ((l.source.did||l.source)===d.to.did&&(l.target.did||l.target)===d.from.did));
      if(lk){lk.trustScore=Math.min(1,(lk.trustScore||0)+(d.verified?0.02:-0.05));lk.messagesExchanged=(lk.messagesExchanged||0)+1;}

      const v=d.verified?'<span class="verified">✓ signature verified</span>':'<span style="color:#ef4444">✗ UNVERIFIED</span>';
      addEv('message',`
        <span class="icon">💬</span> <span class="agent-name">${d.from.name}</span> → <span class="agent-name">${d.to.name}</span> ${v}
        <span class="msg-content">${d.preview}</span>
      `);
      break;
    }

    case 'handshake:verify':{
      const d=ev.data;
      flashNode(d.fromDid,COLORS.handshake);flashNode(d.toDid,COLORS.handshake);
      addEv('handshake',`<span class="icon">🤝</span> <span class="agent-name">${d.fromName}</span> ↔ <span class="agent-name">${d.toName}</span> — Ed25519 identity verified`);
      break;
    }

    case 'trust:update':{
      const d=ev.data;
      const dir=d.delta>0?'↑':'↓',clr=d.delta>0?'#10b981':'#ef4444';
      addEv('trust',`<span class="icon">⚡</span> Trust ${dir} <span class="agent-name">${d.fromName}</span> → <span class="agent-name">${d.toName}</span> <span style="color:${clr}">${d.delta>0?'+':''}${(d.delta*100).toFixed(0)}%</span> — ${d.reason}`);
      break;
    }

    case 'discovery:query':{
      addEv('connection',`<span class="icon">🔍</span> Discovery: "${ev.data.capability}" → found ${ev.data.results} agent(s)`);
      break;
    }

    case 'peer:connected':{
      addEv('peer',`<span class="icon">🌐</span> Peer connected: <strong>${ev.data.name||ev.data.url}</strong> — ${ev.data.agents||0} agent(s)`);
      break;
    }

    case 'agent:heartbeat':break;
  }
}

connectWs();
window.addEventListener('resize',()=>{
  const w=innerWidth,h=innerHeight;
  svg.attr('width',w).attr('height',h);
  simulation.force('center',d3.forceCenter(w/2,h/2)).alpha(0.3).restart();
});
</script>
</body>
</html>
