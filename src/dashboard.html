<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeshSig — Security Operations</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#121a24;--bg2:#0e1520;--cyan:#00e5ff;--green:#00ff9d;--amber:#ffb300;--red:#ff2952;--purple:#a855f7;
  --text:#e8f4ff;--muted:#5eaed6;--dim:#2a5580;--border:#0c1e38;
  --mono:'JetBrains Mono',monospace;--sans:'Outfit',sans-serif}
body{background:var(--bg);color:var(--text);font-family:var(--sans);height:100vh;overflow:hidden;display:flex}
body::before{content:'';position:fixed;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);animation:scan 4s linear infinite;z-index:1000;opacity:0.3;pointer-events:none}
@keyframes scan{0%{top:0}100%{top:100vh}}
#sidebar{width:220px;height:100vh;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;z-index:50}
.sb-logo{padding:20px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.sb-logo h1{font:700 15px var(--mono);color:var(--cyan);text-shadow:0 0 10px rgba(0,229,255,0.3)}
.sb-logo .tag{font:400 9px var(--mono);color:var(--green);letter-spacing:0.15em}
.sb-nav{flex:1;padding:12px 0}
.sb-item{display:flex;align-items:center;gap:12px;padding:10px 20px;cursor:pointer;font:500 13px var(--sans);color:var(--muted);transition:all 0.3s;border-left:3px solid transparent;user-select:none}
.sb-item:hover{background:rgba(0,229,255,0.04);color:var(--text)}
.sb-item.active{color:var(--cyan);background:rgba(0,229,255,0.08);border-left-color:var(--cyan)}
.sb-item .icon{width:18px;text-align:center;font:500 14px var(--mono)}
.sb-section{font:600 9px var(--mono);color:var(--muted);letter-spacing:0.15em;padding:16px 20px 6px}
.sb-stats{padding:16px 20px;border-top:1px solid var(--border);margin-top:auto}
.sb-stat{display:flex;justify-content:space-between;margin-bottom:6px}
.sb-stat .label{font:400 10px var(--mono);color:var(--dim)}
.sb-stat .value{font:600 11px var(--mono);color:var(--cyan);text-shadow:0 0 8px rgba(0,229,255,0.3)}
.sb-ws{padding:12px 20px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;font:11px var(--mono)}
.pulse{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 1.5s infinite}
.pulse.off{background:var(--red);box-shadow:0 0 8px var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
#main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden}
#topbar{height:52px;background:rgba(14,21,32,0.98);border-bottom:1px solid rgba(0,229,255,0.08);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0}
#page-title{font:600 14px var(--sans);color:#fff}
#clock{font:500 12px var(--mono);color:var(--cyan)}
.page{display:none;flex:1;overflow:hidden}.page.active{display:flex;flex-direction:column}
#p-office{position:relative}
#office-canvas{flex:1}
#events-panel{position:absolute;top:0;right:0;bottom:0;width:360px;background:rgba(14,21,32,0.95);border-left:1px solid rgba(0,229,255,0.1);display:flex;flex-direction:column;backdrop-filter:blur(12px)}
#events-header{padding:14px 18px;border-bottom:1px solid rgba(0,229,255,0.08);font:600 10px var(--mono);color:var(--cyan);letter-spacing:0.15em;display:flex;justify-content:space-between}
#events-header .count{color:var(--green);font-size:13px;font-weight:700}
#events{flex:1;overflow-y:auto}#events::-webkit-scrollbar{width:3px}#events::-webkit-scrollbar-thumb{background:var(--border)}
.ev{padding:10px 18px;border-bottom:1px solid rgba(0,229,255,0.04);animation:evIn 0.5s ease;font:12px var(--mono)}
@keyframes evIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
.ev .ts{color:var(--dim);font-size:10px}.ev .from,.ev .to{color:var(--cyan);font-weight:600}.ev .arrow{color:var(--dim);margin:0 4px}
.ev .badge{display:inline-block;padding:2px 8px;border-radius:3px;font-size:9px;margin-left:6px;font-weight:600}
.ev .badge.ok{background:rgba(0,255,157,0.1);color:var(--green);border:1px solid rgba(0,255,157,0.25)}
.ev .badge.fail{background:rgba(255,41,82,0.1);color:var(--red);border:1px solid rgba(255,41,82,0.25)}
.ev .content{display:block;margin-top:5px;padding:6px 12px;background:linear-gradient(90deg,rgba(0,229,255,0.04),transparent);border-left:2px solid rgba(0,229,255,0.3);border-radius:0 4px 4px 0;color:var(--muted);font-size:11px}
.ev.join{border-left:3px solid var(--green)}.ev.handshake{border-left:3px solid var(--purple)}.ev.message{border-left:3px solid var(--amber)}.ev.system{border-left:3px solid var(--dim)}
.agents-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;padding:24px;overflow-y:auto;flex:1}
.agent-card{background:var(--bg2);border:1px solid rgba(0,229,255,0.1);border-radius:12px;padding:20px;transition:all 0.3s}
.agent-card:hover{border-color:rgba(0,229,255,0.3);transform:translateY(-2px)}
.agent-card .ac-header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.agent-card .ac-dot{width:10px;height:10px;border-radius:50%}.agent-card .ac-name{font:600 16px var(--sans);color:#fff}
.agent-card .ac-did{font:400 10px var(--mono);color:var(--dim);margin-bottom:12px;word-break:break-all}
.agent-card .ac-row{display:flex;justify-content:space-between;padding:4px 0;font-size:13px}
.agent-card .ac-label{color:var(--muted)}.agent-card .ac-value{color:var(--text);font:500 13px var(--mono)}
.agent-card .ac-caps{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.agent-card .ac-cap{font:400 10px var(--mono);padding:3px 8px;border-radius:4px;background:rgba(0,229,255,0.06);color:var(--cyan);border:1px solid rgba(0,229,255,0.15)}
.messages-list{flex:1;overflow-y:auto;padding:24px}
.msg-row{background:var(--bg2);border:1px solid rgba(0,229,255,0.08);border-radius:10px;padding:16px 20px;margin-bottom:12px}
.msg-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.msg-from,.msg-to{font:600 13px var(--mono);color:var(--cyan)}.msg-arrow{color:var(--dim)}.msg-time{margin-left:auto;font:400 10px var(--mono);color:var(--dim)}
.msg-body{font:400 13px var(--mono);color:var(--muted);padding:10px 14px;background:rgba(0,229,255,0.03);border-radius:6px;margin-bottom:8px;border-left:2px solid rgba(0,229,255,0.15)}
.msg-sig{font:400 10px var(--mono);color:var(--dim);word-break:break-all}
.msg-badge{display:inline-block;padding:2px 8px;border-radius:4px;font:500 10px var(--mono);margin-left:8px}
.msg-badge.valid{background:rgba(0,255,157,0.1);color:var(--green);border:1px solid rgba(0,255,157,0.25)}
.msg-badge.invalid{background:rgba(255,41,82,0.1);color:var(--red);border:1px solid rgba(255,41,82,0.25)}
.audit-content{flex:1;overflow-y:auto;padding:24px}
.audit-summary{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-bottom:32px}
.audit-card{background:var(--bg2);border:1px solid rgba(0,229,255,0.08);border-radius:10px;padding:16px;text-align:center}
.audit-card .val{font:700 28px var(--mono);color:var(--cyan)}.audit-card .lbl{font:400 10px var(--mono);color:var(--muted);margin-top:4px}
.audit-card.green .val{color:var(--green)}.audit-card.amber .val{color:var(--amber)}.audit-card.red .val{color:var(--red)}
.audit-actions{display:flex;gap:12px;margin-bottom:24px}
.audit-btn{padding:10px 20px;background:rgba(0,229,255,0.08);border:1px solid rgba(0,229,255,0.2);color:var(--cyan);font:500 12px var(--mono);border-radius:6px;cursor:pointer}
.audit-json{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:20px;font:400 11px var(--mono);color:var(--muted);max-height:400px;overflow-y:auto;white-space:pre-wrap;word-break:break-all}
.verify-content{flex:1;overflow-y:auto;display:flex;align-items:center;justify-content:center;padding:40px}
.verify-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:40px;max-width:560px;width:100%}
.verify-card h2{font:700 20px var(--mono);color:var(--cyan);margin-bottom:6px}
.verify-card .sub{font:300 13px var(--sans);color:var(--muted);margin-bottom:28px}
.verify-card label{font:500 10px var(--mono);color:var(--muted);display:block;margin-bottom:5px;margin-top:16px}
.verify-card textarea,.verify-card input{width:100%;background:var(--bg);border:1px solid var(--dim);border-radius:8px;padding:10px 14px;color:var(--text);font:400 12px var(--mono);outline:none;resize:vertical}
.verify-card textarea{min-height:70px}
.verify-card button{width:100%;margin-top:24px;padding:12px;background:var(--cyan);color:var(--bg);font:600 13px var(--mono);border:none;border-radius:8px;cursor:pointer}
.verify-or{text-align:center;color:var(--dim);font:11px var(--mono);margin:4px 0}
#verify-result{margin-top:20px;padding:16px;border-radius:8px;display:none;text-align:center;font:600 15px var(--mono)}
#verify-result.valid{display:block;background:rgba(0,255,136,0.06);border:1px solid rgba(0,255,136,0.2);color:var(--green)}
#verify-result.invalid{display:block;background:rgba(255,51,85,0.06);border:1px solid rgba(255,51,85,0.2);color:var(--red)}
#verify-result .detail{font:400 10px var(--mono);color:var(--muted);margin-top:6px}
</style>
</head>
<body>
<div id="sidebar">
  <div class="sb-logo">
    <svg width="44" height="34" viewBox="0 0 200 160"><defs><linearGradient id="lg" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#0088ff"/><stop offset="50%" stop-color="#00e5ff"/><stop offset="100%" stop-color="#0088ff"/></linearGradient></defs>
    <path d="M30 80 Q55 30 80 80 Q105 130 120 80 Q145 30 170 80" fill="none" stroke="url(#lg)" stroke-width="1.8"/>
    <circle cx="30" cy="80" r="7" fill="#0088ff"/><circle cx="80" cy="80" r="8" fill="#00bbff"/><circle cx="120" cy="80" r="8" fill="#00bbff"/><circle cx="170" cy="80" r="7" fill="#0088ff"/>
    <circle cx="55" cy="38" r="5" fill="#00ff88"/><circle cx="100" cy="122" r="5" fill="#00ff88"/><circle cx="145" cy="38" r="5" fill="#00ff88"/></svg>
    <div><h1>MESHSIG</h1><div class="tag">SECURITY OPS</div></div>
  </div>
  <div class="sb-nav">
    <div class="sb-section">MONITOR</div>
    <div class="sb-item active" data-page="office"><span class="icon">◉</span> HQ Office</div>
    <div class="sb-item" data-page="agents"><span class="icon">◈</span> Agents</div>
    <div class="sb-item" data-page="messages"><span class="icon">◆</span> Messages</div>
    <div class="sb-section">SECURITY</div>
    <div class="sb-item" data-page="audit"><span class="icon">◧</span> Audit Report</div>
    <div class="sb-item" data-page="verify"><span class="icon">◇</span> Verify Signature</div>
  </div>
  <div class="sb-stats">
    <div class="sb-stat"><span class="label">AGENTS</span><span class="value" id="sb-agents">0</span></div>
    <div class="sb-stat"><span class="label">CONNECTIONS</span><span class="value" id="sb-links">0</span></div>
    <div class="sb-stat"><span class="label">SIGNED MSGS</span><span class="value" id="sb-msgs">0</span></div>
    <div class="sb-stat"><span class="label">AVG TRUST</span><span class="value" id="sb-trust">—</span></div>
  </div>
  <div class="sb-ws"><div class="pulse off" id="wsd"></div><span id="wsl" style="color:var(--muted)">CONNECTING</span></div>
</div>
<div id="main">
  <div id="topbar"><span id="page-title">HQ Office</span><span id="clock"></span></div>
  <div class="page active" id="p-office">
    <canvas id="office-canvas"></canvas>
    <div id="events-panel">
      <div id="events-header"><span>LIVE SECURITY FEED</span><span class="count" id="ev-count">0</span></div>
      <div id="events"></div>
    </div>
  </div>
  <div class="page" id="p-agents"><div class="agents-grid" id="agents-grid"></div></div>
  <div class="page" id="p-messages"><div class="messages-list" id="messages-list"></div></div>
  <div class="page" id="p-audit"><div class="audit-content" id="audit-content"></div></div>
  <div class="page" id="p-verify"><div class="verify-content"><div class="verify-card">
    <h2>VERIFY SIGNATURE</h2><p class="sub">Paste message, signature, and public key or DID.</p>
    <label>MESSAGE</label><textarea id="v-msg"></textarea>
    <label>SIGNATURE</label><input id="v-sig">
    <label>PUBLIC KEY</label><input id="v-pk">
    <div class="verify-or">— or —</div>
    <label>DID</label><input id="v-did">
    <button onclick="doVerify()">VERIFY SIGNATURE</button>
    <div id="verify-result"><div id="vr-text"></div><div class="detail" id="vr-detail"></div></div>
  </div></div></div>
</div>
<script>
// === STATE ===
let agents=[],connections=[],msgCount=0,evCount=0;
const titles={office:'HQ Office',agents:'Agents',messages:'Signed Messages',audit:'Audit Report',verify:'Verify Signature'};

// === ISOMETRIC OFFICE ENGINE ===
const CV=document.getElementById('office-canvas'),X=CV.getContext('2d');
let CW,CH;
const T=30,COS=T*Math.cos(Math.PI/6),SIN=T*Math.sin(Math.PI/6);
function toSc(gx,gy){return{x:(gx-gy)*COS+CW/2,y:(gx+gy)*SIN+CH*0.12}}
function resizeCanvas(){CW=CV.parentElement.clientWidth-360;CH=CV.parentElement.clientHeight;CV.width=CW;CV.height=CH}
let panX=0,panY=0,zoom=0.82,dragging=false,dragX=0,dragY=0;
CV.addEventListener("mousedown",e=>{dragging=true;dragX=e.clientX-panX;dragY=e.clientY-panY;CV.style.cursor="grabbing"});
CV.addEventListener("mousemove",e=>{if(dragging){panX=e.clientX-dragX;panY=e.clientY-dragY}});
CV.addEventListener("mouseup",()=>{dragging=false;CV.style.cursor="grab"});
CV.addEventListener("mouseleave",()=>{dragging=false;CV.style.cursor="grab"});
CV.addEventListener("wheel",e=>{e.preventDefault();const d=e.deltaY>0?0.95:1.05;zoom=Math.max(0.3,Math.min(3,zoom*d))},{passive:false});
CV.style.cursor="grab";

function box(gx,gy,w,d,h,tc,lc,rc){const p=toSc(gx,gy);const wx=COS*w,wy=SIN*w,ddx=COS*d,ddy=SIN*d;X.fillStyle=tc;X.beginPath();X.moveTo(p.x,p.y-h);X.lineTo(p.x+wx,p.y+wy-h);X.lineTo(p.x+wx-ddx,p.y+wy+ddy-h);X.lineTo(p.x-ddx,p.y+ddy-h);X.closePath();X.fill();X.fillStyle=lc;X.beginPath();X.moveTo(p.x-ddx,p.y+ddy-h);X.lineTo(p.x+wx-ddx,p.y+wy+ddy-h);X.lineTo(p.x+wx-ddx,p.y+wy+ddy);X.lineTo(p.x-ddx,p.y+ddy);X.closePath();X.fill();X.fillStyle=rc;X.beginPath();X.moveTo(p.x+wx,p.y+wy-h);X.lineTo(p.x+wx-ddx,p.y+wy+ddy-h);X.lineTo(p.x+wx-ddx,p.y+wy+ddy);X.lineTo(p.x+wx,p.y+wy);X.closePath();X.fill()}
function tile(gx,gy,w,d,c){const p=toSc(gx,gy),wx=COS*w,wy=SIN*w,ddx=COS*d,ddy=SIN*d;X.fillStyle=c;X.beginPath();X.moveTo(p.x,p.y);X.lineTo(p.x+wx,p.y+wy);X.lineTo(p.x+wx-ddx,p.y+wy+ddy);X.lineTo(p.x-ddx,p.y+ddy);X.closePath();X.fill();X.strokeStyle='rgba(0,0,0,0.03)';X.lineWidth=0.5;X.stroke()}

const OW=20,OH=15;
function drawFloor(){for(let i=0;i<OW;i++)for(let j=0;j<OH;j++)tile(i,j,1,1,(i+j)%2?'#c4b898':'#cec8a8');tile(0.1,0.1,9.8,6.8,'#c0d0e0');tile(10.6,0.1,9.3,6.8,'#c0e0cc');tile(0.1,7.6,6.8,7.3,'#d8c8e0');tile(7.6,7.6,5.8,7.3,'#e8dcc0');tile(14.1,7.6,5.8,7.3,'#d0e0e8')}
function drawWalls(){
  // Outer walls only
  box(0,0,OW,0.15,55,'#8a96a8','#6a7888','#7a8898');
  box(0,0,0.15,OH,55,'#8a96a8','#6a7888','#7a8898');
  // Meeting room walls (enclosed with door gap at y=7.5-9)
  box(0,7.5,5,0.12,30,'#96a4b4','#7888a0','#8898a8'); // top wall
  box(5,7.5,0.12,2,30,'#96a4b4','#7888a0','#8898a8'); // right wall top
  box(5,9.5,0.12,5.5,30,'#96a4b4','#7888a0','#8898a8'); // right wall bottom
  // Door frame meeting
  box(4.95,9,0.22,0.12,33,'#705030','#604020','#684828');
  box(4.95,9.4,0.22,0.12,33,'#705030','#604020','#684828');
  // Server room walls (enclosed with door gap at y=7.5-9)
  box(14,7.5,0.12,2,30,'#96a4b4','#7888a0','#8898a8'); // left wall top
  box(14,9.5,0.12,5.5,30,'#96a4b4','#7888a0','#8898a8'); // left wall bottom
  box(14,7.5,6,0.12,30,'#96a4b4','#7888a0','#8898a8'); // top wall
  // Door frame server
  box(13.95,9,0.22,0.12,33,'#705030','#604020','#684828');
  box(13.95,9.4,0.22,0.12,33,'#705030','#604020','#684828');
  // Zone labels
  [['MANAGEMENT','#2196F3',5,3.5],['SUPPORT','#4CAF50',15,3.5],['MEETING','#9C27B0',3.5,11],['BREAK ROOM','#FF9800',10.5,10],['OPS CENTER','#00BCD4',17,11]].forEach(l=>{const s=toSc(l[2],l[3]);X.font='bold 9px "Courier New"';X.textAlign='center';X.fillStyle=l[1];X.globalAlpha=0.4;X.fillText(l[0],s.x,s.y+28);X.globalAlpha=1});
}

// Furniture
function drawDesk(gx,gy){box(gx,gy,1.3,0.65,14,'#7a6448','#604830','#6a5238');box(gx+0.05,gy+0.05,0.1,0.1,14,'#5a4028','#4a3018','#5a4028');box(gx+1.15,gy+0.05,0.1,0.1,14,'#5a4028','#4a3018','#5a4028');box(gx+0.05,gy+0.5,0.1,0.1,14,'#5a4028','#4a3018','#5a4028');box(gx+1.15,gy+0.5,0.1,0.1,14,'#5a4028','#4a3018','#5a4028');box(gx+0.3,gy+0.12,0.65,0.4,2,'#444','#333','#3a3a3a');box(gx+0.35,gy+0.05,0.55,0.06,10,'#333','#222','#2a2a2a');const s=toSc(gx+0.45,gy+0.06);X.fillStyle='#55aaee';X.globalAlpha=0.5;X.fillRect(s.x-4,s.y-8,8,6);X.globalAlpha=1}
function drawChair(gx,gy,c,facing){c=c||'#333';const d=c==='#333'?'#222':'#1a2838';
  // Wheel base (star shape simplified as cross)
  box(gx+0.05,gy+0.15,0.3,0.05,2,'#555','#444','#4a4a4a');
  box(gx+0.15,gy+0.05,0.05,0.3,2,'#555','#444','#4a4a4a');
  // Stem
  box(gx+0.14,gy+0.14,0.1,0.1,7,'#555','#444','#4a4a4a');
  // Seat cushion
  box(gx,gy,0.4,0.4,3,c,d,c);
  // Backrest - position depends on facing
  if(facing==='up')box(gx+0.05,gy,0.3,0.06,14,c,d,c);
  else if(facing==='down')box(gx+0.05,gy+0.34,0.3,0.06,14,c,d,c);
  else if(facing==='left')box(gx,gy+0.05,0.06,0.3,14,c,d,c);
  else box(gx+0.34,gy+0.05,0.06,0.3,14,c,d,c); // right default
}
function drawLongTable(gx,gy,len){box(gx,gy,len,1.2,12,'#6a5038','#5a4028','#624830');box(gx+0.1,gy+0.1,0.12,0.12,12,'#4a3020','#3a2010','#4a3020');box(gx+len-0.22,gy+0.1,0.12,0.12,12,'#4a3020','#3a2010','#4a3020');box(gx+0.1,gy+0.96,0.12,0.12,12,'#4a3020','#3a2010','#4a3020');box(gx+len-0.22,gy+0.96,0.12,0.12,12,'#4a3020','#3a2010','#4a3020')}
function drawSofa(gx,gy,dir){

function getZone(x,y){if(y<7.5)return x<10.5?'mgmt':'support';if(x<7)return'meeting';if(x<14)return'break';return'ops'}
function interp(a,b,n){const r=[];for(let i=1;i<=n;i++)r.push({x:a.x+(b.x-a.x)*i/n,y:a.y+(b.y-a.y)*i/n});return r}
function buildPath(a,dz){if(a.zone===dz)return interp({x:a.x,y:a.y},ZONE_PTS[dz],8);const k=a.zone+'->'+dz;const r=ROUTES[k];if(!r)return interp({x:a.x,y:a.y},ZONE_PTS[dz]||a.home,10);const pts=[];let c={x:a.x,y:a.y};for(const w of r){pts.push(...interp(c,w,Math.max(5,Math.floor(Math.hypot(w.x-c.x,w.y-c.y)*3))));c=w}pts.push(...interp(c,ZONE_PTS[dz],6));return pts}
function assignWalk(a){let d=DEST[Math.floor(Math.random()*DEST.length)];if(d===a.zone)d=DEST[(DEST.indexOf(d)+1)%DEST.length];a.path=buildPath(a,d);a.pi=0;a.st=Date.now();a._nz=d}

function syncAgentChars(){
  // Each desk has a specific seat position (where agent sits)
  const MGMT_SEATS=[{x:1.3,y:2.2},{x:3.3,y:2.2},{x:5.3,y:2.2},{x:1.3,y:4.7},{x:3.3,y:4.7},{x:5.3,y:4.7}];
  const SUPPORT_SEATS=[{x:11.8,y:2.2},{x:13.8,y:2.2},{x:15.8,y:2.2},{x:11.8,y:4.7},{x:13.8,y:4.7},{x:15.8,y:4.7}];
  let mgmtIdx=0,supportIdx=0;
  agents.forEach((a,i)=>{
    let c=agentChars.find(x=>x.did===a.did);
    if(!c){
      const caps=(a.capabilities||[]).map(x=>x.type);
      const isManager=caps.includes('management')||caps.includes('delegation');
      let seat,zone;
      if(isManager){seat=MGMT_SEATS[mgmtIdx++]||MGMT_SEATS[0];zone='mgmt'}
      else{seat=SUPPORT_SEATS[supportIdx++]||SUPPORT_SEATS[0];zone='support'}
      c={did:a.did,name:a.displayName,color:COLORS[i%COLORS.length],lc:DARK_COLORS[i%DARK_COLORS.length],hair:HAIRS[i%HAIRS.length],
        role:caps.join(', '),zone,home:{x:seat.x,y:seat.y},x:seat.x,y:seat.y,
        path:[],pi:0,st:0,si:100+i*10,idle:Date.now()+99999,glow:false};
      agentChars.push(c);
    }
    c.name=a.displayName;
  });
}

function updateAgents(){const now=Date.now();agentChars.forEach(a=>{if(a.path.length>0&&a.pi<a.path.length){if(now-a.st>a.si){a.x=a.path[a.pi].x;a.y=a.path[a.pi].y;a.pi++;a.st=now;if(a.pi>=a.path.length){a.path=[];a.zone=a._nz||a.zone}}}})}

// Particles
const particles=[];
function addP(fromDid,toDid,text){const f=agentChars.find(c=>c.did===fromDid),t=agentChars.find(c=>c.did===toDid);if(!f||!t)return;particles.push({fx:f.x,fy:f.y,tx:t.x,ty:t.y,text,s:Date.now(),d:1800,trail:[]});f.glow=t.glow=true;setTimeout(()=>{f.glow=t.glow=false},3500);
// Walk sender toward receiver then back
const midX=f.home.x+(t.x-f.home.x)*0.4,midY=f.home.y+(t.y-f.home.y)*0.4;
const toMid=interp({x:f.x,y:f.y},{x:midX,y:midY},12);
const toHome=interp({x:midX,y:midY},f.home,12);
f.path=[...toMid,...toMid.map(()=>({x:midX,y:midY})).slice(0,8),...toHome];f.pi=0;f.st=Date.now();f._nz=f.zone}
function drawP(){const now=Date.now();for(let i=particles.length-1;i>=0;i--){const p=particles[i],t=(now-p.s)/p.d;if(t>1){particles.splice(i,1);continue}const cx=p.fx+(p.tx-p.fx)*t,cy=p.fy+(p.ty-p.fy)*t,sc=toSc(cx,cy);p.trail.push({x:sc.x,y:sc.y,t:now});for(let j=p.trail.length-1;j>=0;j--){const a=(now-p.trail[j].t)/200;if(a>1){p.trail.splice(j,1);continue}X.fillStyle='#FF9800';X.globalAlpha=0.5*(1-a);X.beginPath();X.arc(p.trail[j].x,p.trail[j].y,3*(1-a),0,Math.PI*2);X.fill()}X.fillStyle='#FF9800';X.globalAlpha=0.95;X.beginPath();X.arc(sc.x,sc.y,7,0,Math.PI*2);X.fill();X.globalAlpha=1;if(p.text&&t>0.15&&t<0.85){X.font='bold 9px "Courier New"';X.textAlign='center';const tw2=X.measureText('"'+p.text+'"').width;X.fillStyle='rgba(0,0,0,0.75)';X.beginPath();X.roundRect(sc.x-tw2/2-5,sc.y-28,tw2+10,16,3);X.fill();X.fillStyle='#FF9800';X.globalAlpha=Math.min(1,(t-0.15)*5)*Math.min(1,(0.85-t)*5);X.fillText('"'+p.text+'"',sc.x,sc.y-16);X.globalAlpha=1}}}

function drawHUD(){X.font='bold 11px "Courier New"';X.textAlign='left';X.fillStyle='#00e5ff';X.globalAlpha=0.6;X.fillText('MESHSIG HEADQUARTERS',10,16);X.font='9px "Courier New"';X.fillStyle='#5a7a9a';X.fillText(agentChars.length+' AGENTS · '+connections.length+' CONNECTIONS · PROXY ACTIVE',10,28);X.globalAlpha=1;X.strokeStyle='#00e5ff';X.lineWidth=1.5;X.globalAlpha=0.12;[[2,24,2,2,24,2],[CW-24,2,CW-2,2,CW-2,24],[2,CH-24,2,CH-2,24,CH-2],[CW-24,CH-2,CW-2,CH-2,CW-2,CH-24]].forEach(c=>{X.beginPath();X.moveTo(c[0],c[1]);X.lineTo(c[2],c[3]);X.lineTo(c[4],c[5]);X.stroke()});X.globalAlpha=1}

function updateStats(){document.getElementById('sb-agents').textContent=agents.length;document.getElementById('sb-links').textContent=connections.length;document.getElementById('sb-msgs').textContent=msgCount;const ts=agents.map(n=>n.trustScore||0).filter(t=>t>0);document.getElementById('sb-trust').textContent=ts.length?(ts.reduce((a,b)=>a+b,0)/ts.length*100).toFixed(0)+'%':'—'}

// Audio
let audioCtx=null;function playBeep(f,d,v){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.frequency.value=f;o.type='sine';g.gain.setValueAtTime(v,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d);o.start();o.stop(audioCtx.currentTime+d)}
function playMsg(){playBeep(1200,0.06,0.08);setTimeout(()=>playBeep(1600,0.04,0.06),70)}
function playJoin(){playBeep(600,0.1,0.06);setTimeout(()=>playBeep(900,0.08,0.05),120)}
document.addEventListener('click',()=>{if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()},{once:true});

// === PAGES ===
function renderAgentsPage(){const g=document.getElementById('agents-grid');g.innerHTML='';for(const a of agents){const caps=(a.capabilities||[]).map(c=>'<span class="ac-cap">'+c.type+'</span>').join('');g.innerHTML+='<div class="agent-card"><div class="ac-header"><div class="ac-dot" style="background:#00e5ff"></div><span class="ac-name">'+a.displayName+'</span></div><div class="ac-did">'+a.did+'</div><div class="ac-row"><span class="ac-label">Trust</span><span class="ac-value">'+((a.trustScore||0)*100).toFixed(1)+'%</span></div><div class="ac-row"><span class="ac-label">Status</span><span class="ac-value" style="color:var(--green)">Online</span></div><div class="ac-caps">'+caps+'</div></div>'}if(!agents.length)g.innerHTML='<div style="color:var(--dim);padding:40px;font:14px var(--mono);text-align:center">No agents</div>'}
async function renderMessagesPage(){const l=document.getElementById('messages-list');l.innerHTML='Loading...';try{const r=await fetch('/messages?limit=100');const d=await r.json();const msgs=d.messages||[];if(!msgs.length){l.innerHTML='<div style="color:var(--dim);padding:40px;text-align:center">No messages</div>';return}l.innerHTML='';for(const m of msgs.reverse()){const from=agents.find(n=>n.did===m.fromDid)?.displayName||'?';const to=agents.find(n=>n.did===m.toDid)?.displayName||'?';const badge=m.verified?'<span class="msg-badge valid">VERIFIED ✓</span>':'<span class="msg-badge invalid">FAILED</span>';l.innerHTML+='<div class="msg-row"><div class="msg-header"><span class="msg-from">'+from+'</span><span class="msg-arrow">→</span><span class="msg-to">'+to+'</span>'+badge+'</div><div class="msg-body">'+(m.content||'').slice(0,300)+'</div><div class="msg-sig">sig: '+(m.signature||'').slice(0,60)+'...</div></div>'}}catch(e){l.innerHTML='Error: '+e.message}}
async function renderAuditPage(){const c=document.getElementById('audit-content');c.innerHTML='Loading...';try{const r=await fetch('/audit/export');const d=await r.json();const s=d.summary;c.innerHTML='<div class="audit-summary"><div class="audit-card"><div class="val">'+s.totalAgents+'</div><div class="lbl">AGENTS</div></div><div class="audit-card"><div class="val">'+s.totalConnections+'</div><div class="lbl">CONNECTIONS</div></div><div class="audit-card amber"><div class="val">'+s.totalMessages+'</div><div class="lbl">MESSAGES</div></div><div class="audit-card green"><div class="val">'+s.verifiedMessages+'</div><div class="lbl">VERIFIED</div></div><div class="audit-card red"><div class="val">'+s.failedVerifications+'</div><div class="lbl">FAILED</div></div></div><div class="audit-actions"><button class="audit-btn" onclick="downloadAudit()">Download JSON</button></div><div class="audit-json">'+JSON.stringify(d,null,2)+'</div>';window._auditData=d}catch(e){c.innerHTML='Error: '+e.message}}
function downloadAudit(){if(!window._auditData)return;const b=new Blob([JSON.stringify(window._auditData,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='meshsig-audit.json';a.click()}
async function doVerify(){const msg=document.getElementById('v-msg').value.trim(),sig=document.getElementById('v-sig').value.trim(),pk=document.getElementById('v-pk').value.trim(),did=document.getElementById('v-did').value.trim();const r=document.getElementById('verify-result'),rt=document.getElementById('vr-text'),rd=document.getElementById('vr-detail');if(!msg||!sig||(!pk&&!did)){r.className='invalid';r.style.display='block';rt.textContent='Fill all fields';return}const body={message:msg,signature:sig};if(did)body.did=did;else body.publicKey=pk;try{const res=await fetch('/verify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const d=await res.json();if(d.valid){r.className='valid';rt.textContent='✓ VALID';rd.textContent='Verified at '+d.verifiedAt}else{r.className='invalid';rt.textContent='✗ INVALID';rd.textContent='No match'}}catch(e){r.className='invalid';rt.textContent='Error';rd.textContent=e.message}}

// === WEBSOCKET ===
let ws;function connectWs(){const p=location.protocol==='https:'?'wss:':'ws:';ws=new WebSocket(p+'//'+location.host+'?role=dashboard');ws.onopen=()=>{document.getElementById('wsd').className='pulse';document.getElementById('wsl').textContent='LIVE';document.getElementById('wsl').style.color='var(--green)';addEv('system','<span style="color:var(--green)">● CONNECTED</span> to MeshSig')};ws.onmessage=e=>{try{handle(JSON.parse(e.data))}catch{}};ws.onclose=()=>{document.getElementById('wsd').className='pulse off';document.getElementById('wsl').textContent='OFFLINE';document.getElementById('wsl').style.color='var(--red)';setTimeout(connectWs,2000)}}
function handle(ev){switch(ev.type){
case 'snapshot':agents=[];connections=[];for(const a of ev.data.agents)agents.push({...a,online:true});for(const c of ev.data.connections)connections.push(c);syncAgentChars();updateStats();addEv('system','Loaded <strong>'+agents.length+'</strong> agents, <strong>'+connections.length+'</strong> connections');break;
case 'agent:register':{const d=ev.data;if(!agents.find(n=>n.did===d.did)){agents.push({did:d.did,displayName:d.name,capabilities:d.capabilities,publicKey:d.publicKey,trustScore:d.trustScore||0,online:true,origin:d.origin||'local'});syncAgentChars();updateStats();playJoin()}addEv('join','<span class="from">'+d.name+'</span> joined <span class="badge ok">IDENTITY</span>');break}
case 'connection:established':{const d=ev.data;connections.push({agentADid:d.agentA.did,agentBDid:d.agentB.did});updateStats();addEv('handshake','<span class="from">'+d.agentA.name+'</span><span class="arrow">⟷</span><span class="to">'+d.agentB.name+'</span> <span class="badge ok">HANDSHAKE</span>');break}
case 'message:sent':{const d=ev.data;msgCount++;updateStats();addP(d.from?.did,d.to?.did,d.preview);const v=d.verified?'<span class="badge ok">SIGNED ✓</span>':'<span class="badge fail">UNVERIFIED</span>';addEv('message','<span class="from">'+(d.from?.name||'?')+'</span><span class="arrow">→</span><span class="to">'+(d.to?.name||'?')+'</span> '+v+'<span class="content">'+(d.preview||'')+'</span>');playMsg();break}
case 'handshake:verify':{const d=ev.data;addEv('handshake','<span class="from">'+d.fromName+'</span><span class="arrow">⟷</span><span class="to">'+d.toName+'</span> <span class="badge ok">Ed25519</span>');break}
case 'agent:removed':{const d=ev.data;agents=agents.filter(a=>a.did!==d.did);const i=agentChars.findIndex(c=>c.did===d.did);if(i!==-1)agentChars.splice(i,1);updateStats();addEv('system','<span style="color:var(--red)">✗</span> Agent removed');break}}}

// === INIT ===
resizeCanvas();render();connectWs();window.addEventListener('resize',resizeCanvas);
</script>
</body>
</html>
